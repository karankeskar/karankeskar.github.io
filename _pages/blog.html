<section class="section section-decorated" style="position: relative; overflow: hidden; padding: 80px 0;">
  <div class="container">
    
    <div class="row mb-5">
      <div class="col-12 text-center">
        <div style="display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
          <div style="width: 12px; height: 12px; background: #EF4444; border-radius: 50%;"></div>
          <div style="width: 12px; height: 12px; background: #F59E0B; border-radius: 50%;"></div>
          <div style="width: 12px; height: 12px; background: #10B981; border-radius: 50%;"></div>
        </div>
        <h6 class="text-uppercase mb-2" style="color: #94A3B8; font-weight: 600; letter-spacing: 0.15em; font-size: 0.75rem;">Writing</h6>
        <h2 class="section-title mb-3" style="color: #0F172A; font-weight: 700;">Blog</h2>
        <div style="width: 60px; height: 3px; background: #F59E0B; margin: 0 auto 1rem;"></div>
        <p style="color: #64748B; font-size: 0.95rem;">
          Also published on 
          <a href="https://karanbuilds.wordpress.com" target="_blank" rel="noopener noreferrer" 
             style="color: #0F172A; font-weight: 600; text-decoration: underline;">karanbuilds.wordpress.com</a>
        </p>
      </div>
    </div>

    <!-- Posts injected here by JS -->
    <div id="blog-grid" class="row" style="position: relative; z-index: 2;">
      <div class="col-12 text-center" style="padding: 3rem 0;">
        <p style="color: #94A3B8;">Loading posts...</p>
      </div>
    </div>

  </div>
</section>

<style>
.blog-card {
  background: #FFFFFF;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #E2E8F0;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  height: 100%;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
}
.blog-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
  text-decoration: none;
  color: inherit;
}
.blog-card:focus,
.blog-card:active,
.blog-card:visited {
  text-decoration: none;
  color: inherit;
}
.blog-card-content {
  padding: 1.75rem;
  flex-grow: 1;
  display: flex;
  flex-direction: column;
}
.blog-card-date {
  color: #000000;
  font-size: 0.8rem;
  font-weight: 500;
  margin-bottom: 0.6rem;
  font-family: monospace;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.blog-card-title {
  color: #000000;
  font-weight: 700;
  font-size: 1.2rem;
  margin-bottom: 0.75rem;
  line-height: 1.4;
}
.blog-card-excerpt {
  color: #000000;
  font-size: 0.92rem;
  line-height: 1.7;
  flex-grow: 1;
  margin-bottom: 1.25rem;
}
.blog-card-link {
  color: #000000;
  font-weight: 600;
  font-size: 0.85rem;
  font-family: monospace;
  margin-top: auto;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: color 0.2s ease;
}
.blog-card:hover .blog-card-link {
  color: #000000;
}
a.blog-card,
a.blog-card:hover,
a.blog-card:focus,
a.blog-card:active,
a.blog-card:visited {
  text-decoration: none !important;
  box-shadow: none !important;
  border-bottom: none !important;
  outline: none !important;
}
</style>

<script>
fetch('https://api.rss2json.com/v1/api.json?rss_url=https://karanbuilds.wordpress.com/feed/')
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var grid = document.getElementById('blog-grid');
    if (!data.items || data.items.length === 0) {
      grid.innerHTML = '<div class="col-12 text-center"><p style="color:#94A3B8;">No posts found.</p></div>';
      return;
    }
    grid.innerHTML = data.items.map(function(post) {
      var date = new Date(post.pubDate).toLocaleDateString('en-AU', { year: 'numeric', month: 'short', day: 'numeric' });
      var excerpt = post.description.replace(/<[^>]+>/g, '').substring(0, 160).trim() + '...';
      return '<div class="col-lg-6 col-md-6 mb-4">' +
        '<a href="' + post.link + '" target="_blank" rel="noopener noreferrer" class="blog-card">' +
          '<div class="blog-card-content">' +
            '<p class="blog-card-date">' + date + '</p>' +
            '<h3 class="blog-card-title">' + post.title + '</h3>' +
            '<p class="blog-card-excerpt">' + excerpt + '</p>' +
            '<span class="blog-card-link">Read on WordPress <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>' +
          '</div>' +
        '</a>' +
      '</div>';
    }).join('');
  })
  .catch(function() {
    document.getElementById('blog-grid').innerHTML = 
      '<div class="col-12 text-center"><p style="color:#94A3B8;">Could not load posts. <a href="https://karanbuilds.wordpress.com" target="_blank" style="color:#0F172A;font-weight:600;">Visit the blog directly →</a></p></div>';
  });
</script>
